---
layout: default
title: Home
---

{% assign posts = collections.posts | reverse %}
<div class="posts">
  {% for post in posts %}
  <div class="post">
    <h1 class="post-title">
      <a href="{{ post.url }}">
        {{ post.data.title }}
      </a>
    </h1>
    <p>{{ post.data.summary }}</p>
  </div>
  {% endfor %}
</div>
